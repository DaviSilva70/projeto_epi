{% extends "base.html" %}

{% block title %}Editar Colaborador - Sistema EPI{% endblock %}

{% block extra_css %}
<style>
    .form-label {
        font-weight: 500;
        color: #333;
        margin-bottom: 8px;
    }
    
    .form-control, .form-select {
        border-radius: 8px;
        padding: 12px 15px;
    }
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-edit me-2"></i> Editar Colaborador</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-user me-1"></i> Nome Completo</label>
                        {{ form.nome_completo }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-id-card me-1"></i> Matrícula</label>
                        {{ form.matricula }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-briefcase me-1"></i> Função</label>
                        {{ form.funcao }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-building me-1"></i> Setor</label>
                        {{ form.setor }}
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1 py-2">
                            <i class="fas fa-save me-2"></i> Salvar
                        </button>
                        <a href="{% url 'cadastrar_colaborador' %}" class="btn btn-secondary flex-grow-1 py-2">
                            <i class="fas fa-arrow-left me-2"></i> Voltar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
